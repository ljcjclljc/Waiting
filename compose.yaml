services:
  blog:
    image: drogon-blog:github
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./content:/app/content:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
